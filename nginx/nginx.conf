server {
    listen 80;
    server_name mondomaine.com www.mondomaine.com;

    # Redirection HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mondomaine.com www.mondomaine.com;

    ssl_certificate     /etc/letsencrypt/live/mondomaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mondomaine.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Taille max upload (PDF 20 Mo)
    client_max_body_size 22M;

    # ── Frontend Vue.js (fichiers statiques buildés) ──
    root /home/ubuntu/plateforme-pedagogique/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Django via Gunicorn ──
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Interface admin Django ──
    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Fichiers statiques Django (collectstatic) ──
    location /static/ {
        alias /home/ubuntu/plateforme-pedagogique/backend/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Fichiers PDF uploadés ──
    location /media/ {
        alias /home/ubuntu/plateforme-pedagogique/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
        # Forcer le téléchargement est géré côté Django (/telecharger/)
        # Ce bloc sert uniquement l'aperçu inline
    }

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
